<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who's Watching ❤️</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro" class="intro-screen">
  <div class="netflix-logo">1</div>
</div>

<!-- 🌌 STARS -->
<canvas id="stars"></canvas>

<!-- 🎥 FLASH -->
<div id="flash"></div>

<!-- 👤 MAIN -->
<div id="mainContent" class="container text-center hidden">

  <h1 class="mt-5">Who's watching?</h1>

  <div class="row justify-content-center mt-5 g-4">

    <!-- pass "this" -->
    <div class="col-6 col-md-2 profile" onclick="openPin(this)">
      <img src="images/1.jpg" class="profile-img">
      <p>Daisyree</p>
    </div>

    <div class="col-6 col-md-2 profile" onclick="openPin(this)">
      <img src="images/2.jpg" class="profile-img">
      <p>Yna</p>
    </div>

    <div class="col-6 col-md-2 profile" onclick="openPin(this)">
      <img src="images/3.jpg" class="profile-img">
      <p>Kyle</p>
    </div>

    <div class="col-6 col-md-2 profile" onclick="openPin(this)">
      <img src="images/4.jpg" class="profile-img">
      <p>Edward</p>
    </div>

    <div class="col-6 col-md-2 profile" onclick="openPin(this)">
      <img src="images/5.jpg" class="profile-img">
      <p>US</p>
    </div>

  </div>
</div>

<!-- 🌫️ OVERLAY -->
<div id="overlay" class="overlay"></div>

<!-- 🔐 PIN -->
<div id="pinModal" class="pin-modal">
  <div class="pin-box position-relative text-center">

    <button class="btn-close btn-close-white position-absolute top-0 end-0 m-2" onclick="closePin()"></button>

    <h4>Enter PIN</h4>
    <p>Hint:The day we got into relationship.</p>
    <input type="password" id="pinInput" class="form-control text-center mt-3" maxlength="6">

    <button class="btn btn-danger w-100 mt-3" onclick="checkPin()">Unlock</button>
    <small id="pinError" class="text-danger"></small>

  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
